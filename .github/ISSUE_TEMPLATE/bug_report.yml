name: Bug Report
description: Report a bug in khonliang
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to trigger the bug.
      render: python
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12" # yamllint disable-line rule:quoted-strings
  - type: input
    id: khonliang-version
    attributes:
      label: khonliang version
      placeholder: "0.4.0" # yamllint disable-line rule:quoted-strings
  - type: input
    id: ollama-version
    attributes:
      label: Ollama version (if applicable)
      placeholder: "0.3.x" # yamllint disable-line rule:quoted-strings
